<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Links • 4 Botões</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container" aria-label="Atalhos">
    <header class="header">
      <div>
        <h1 class="title">Escolha um site</h1>
        <p class="subtitle">Clique para abrir em outra aba</p>
      </div>
    </header>

    <div class="button-grid" role="navigation" aria-label="Links">
      <a class="btn btn--green" href="https://portal.nortenenergia.com.br/faturas/" target="_blank" rel="noopener noreferrer">
        <span>Portal - Norten Energia</span>
      </a>

      <a class="btn btn--yellow" href="https://nortenenergia.com.br/sistema/login" target="_blank" rel="noopener noreferrer">
        <span>CRM - Norten Energia</span>
      </a>

      <a class="btn btn--blue" href="https://norten.chatmobi.com.br/login" target="_blank" rel="noopener noreferrer">
        <span>ChatMobi - Norten Energia</span>
      </a>

      <a class="btn btn--blue" href="https://app2.zapsign.com.br/access/sign-in" target="_blank" rel="noopener noreferrer">
        <span>Zapsign - Acesso</span>
      </a>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
